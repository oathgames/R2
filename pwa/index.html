<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#08080a">
<title>Merlin</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="status-bar">
  <span id="status-dot"></span>
  <span id="status-text">Connecting...</span>
</div>

<div id="chat">
  <div id="messages"></div>
</div>

<div id="input-bar">
  <textarea id="input" placeholder="Message Merlin..." rows="1"></textarea>
  <button id="send-btn" aria-label="Send">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2 L11 13"/><path d="M22 2 L15 22 L11 13 L2 9 Z"/></svg>
  </button>
</div>

<div id="approval" class="hidden">
  <div id="approval-label"></div>
  <div id="approval-cost"></div>
  <div id="approval-actions">
    <button id="btn-approve" class="btn-action btn-approve-style">Allow</button>
    <button id="btn-deny" class="btn-action btn-deny-style">Not now</button>
  </div>
</div>

<script src="pwa.js"></script>
</body>
</html>
