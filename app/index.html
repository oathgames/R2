<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline'; img-src 'self' merlin: data:; font-src 'self' https://fonts.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com">
<title>Merlin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>


<!-- Chat -->
<div id="chat">
  <div id="messages"></div>
</div>

<!-- Input bar -->
<div id="input-bar">
  <textarea id="input" placeholder="Message Merlin..." rows="1"></textarea>
  <button id="send-btn" aria-label="Send">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2 L11 13"/><path d="M22 2 L15 22 L11 13 L2 9 Z"/></svg>
  </button>
</div>

<!-- Approval card (hidden) -->
<div id="approval" class="hidden">
  <div id="approval-label"></div>
  <div id="approval-cost"></div>
  <div id="approval-actions">
    <button id="btn-approve" class="btn-action btn-approve-style">Allow</button>
    <button id="btn-deny" class="btn-action btn-deny-style">Not now</button>
  </div>
</div>

<!-- Setup overlay (only shown if Claude Desktop not installed) -->
<div id="setup" class="overlay">
  <div class="setup-card">
    <div class="setup-mascot">🪄</div>
    <h1>Merlin</h1>
    <p class="setup-sub">Your AI CMO</p>
    <p id="setup-status" class="setup-desc">Checking for Claude...</p>
    <button id="setup-install-btn" class="btn-primary">Install Claude Desktop</button>
    <button id="setup-retry-btn" class="btn-secondary">I already have it &mdash; retry</button>
  </div>
</div>

<script src="renderer.js"></script>
</body>
</html>
