<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline'; img-src 'self' r2: data:; font-src 'self' https://fonts.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com">
<title>R2</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Titlebar (draggable) -->
<div id="titlebar">
  <div id="titlebar-text">R2</div>
  <div id="win-controls" class="hidden">
    <button id="btn-min" class="win-btn">&#x2013;</button>
    <button id="btn-max" class="win-btn">&#x25A1;</button>
    <button id="btn-close" class="win-btn win-btn-close">&#x2715;</button>
  </div>
</div>

<!-- Chat -->
<div id="chat">
  <div id="messages"></div>
</div>

<!-- Input bar -->
<div id="input-bar">
  <textarea id="input" placeholder="Message R2..." rows="1"></textarea>
  <button id="send-btn" aria-label="Send">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2 L11 13"/><path d="M22 2 L15 22 L11 13 L2 9 Z"/></svg>
  </button>
</div>

<!-- Approval card (hidden) -->
<div id="approval" class="hidden">
  <div id="approval-label"></div>
  <div id="approval-cost"></div>
  <div id="approval-actions">
    <button id="btn-approve" class="btn-action btn-approve-style">Allow</button>
    <button id="btn-deny" class="btn-action btn-deny-style">Not now</button>
  </div>
</div>

<!-- Setup overlay (first launch) -->
<div id="setup" class="overlay">
  <div class="setup-card">
    <div class="setup-mascot">( &#x25D5; &#x25E1; &#x25D5; )</div>
    <h1>R2</h1>
    <p class="setup-sub">Your AI CMO</p>
    <p class="setup-desc">To get started, you need a Claude account.<br>It takes 60 seconds.</p>
    <div class="setup-steps">
      <div class="setup-step">1. Go to <a href="https://console.anthropic.com/settings/keys" target="_blank">console.anthropic.com</a></div>
      <div class="setup-step">2. Create a key and copy it</div>
      <div class="setup-step">3. Paste it below</div>
    </div>
    <input id="key-input" type="password" placeholder="sk-ant-..." autocomplete="off" spellcheck="false">
    <div id="key-error" class="hidden">That key doesn't look right. It should start with sk-ant-</div>
    <button id="key-submit" class="btn-primary">Connect</button>
  </div>
</div>

<script src="renderer.js"></script>
</body>
</html>
