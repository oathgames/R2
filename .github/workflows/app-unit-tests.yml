name: App unit tests

# Runs the node-based unit tests that live under `app/*.test.js`. These are
# plain-Node tests (no electron runtime required), gated to PRs that touch
# `app/` so we don't burn CI minutes on unrelated changes.
#
# The tests include source-scan regression checks — most importantly
# `app/ws-server.test.js`, which enforces that every `.listen()` in
# `app/*.js` binds to 127.0.0.1 only. Widening any bind would trigger a
# Windows Firewall prompt for every paying user on first launch (see
# CLAUDE.md rule 11 + the REGRESSION GUARD in `app/ws-server.js`).

on:
  push:
    paths:
      - 'app/**'
      - 'test/**'
      - '.github/workflows/app-unit-tests.yml'
  pull_request:
    paths:
      - 'app/**'
      - 'test/**'
      - '.github/workflows/app-unit-tests.yml'

jobs:
  test:
    name: Run app/*.test.js
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      # No `npm install` needed — these tests are written to use only Node
      # stdlib plus in-file stubs (see `app/relay-client.test.js` for the
      # Module._resolveFilename trick that stubs `ws` + `electron`).
      # If a new test genuinely needs a dependency, add `npm ci` here AND
      # a package-lock.json commit.
      # main.js parse-gate — the v1.17.0 launch-crash canary. A module-scope
      # `const stateFile = …` next to the existing `function stateFile(name)`
      # shipped in v1.17.0 bricked the app with `SyntaxError: Identifier
      # 'stateFile' has already been declared` on every install. This test
      # parses main.js with vm.Script and source-scans for the specific
      # identifier collision. If this flips red, DO NOT ship the release.
      - name: main.js duplicate-toplevel-ids lockdown
        run: node --test app/main-no-duplicate-toplevel-ids.test.js
      - name: ws-server listen-bind lockdown
        run: node app/ws-server.test.js
      - name: relay-client contract
        run: node app/relay-client.test.js
      - name: archive-scanner behavior
        run: node app/archive-scanner.test.js
      - name: archive campaign grouping (Archive "Ads" tab)
        run: node app/archive-campaign-group.test.js
      - name: oauth persist roundtrip
        run: node app/oauth-persist.test.js
      - name: sentence splitter
        run: node app/sentence-splitter.test.js
      - name: update-runner terminal-visibility lockdown
        run: node app/update-runner.test.js
      - name: tts-worker validation + ONNX backend matcher
        run: node --test app/tts-worker.test.js
      - name: transcription error humanizer
        run: node --test app/transcribe-error.test.js
      # MCP reliability primitives — the refactor that lets Merlin scale
      # from a single-SKU brand to a 30k-product catalog without getting
      # a client banned. Every primitive + its plumb-through has a test.
      - name: MCP envelope shape
        run: node --test app/mcp-envelope.test.js
      - name: MCP error code vocabulary
        run: node --test app/mcp-errors.test.js
      - name: MCP idempotency store
        run: node --test app/mcp-idempotency.test.js
      - name: MCP concurrency semaphore
        run: node --test app/mcp-concurrency.test.js
      - name: MCP preview/confirm gate
        run: node --test app/mcp-preview.test.js
      - name: MCP redact helpers
        run: node --test app/mcp-redact.test.js
      - name: MCP jobs store
        run: node --test app/mcp-jobs.test.js
      - name: MCP defineTool wrapper
        run: node --test app/mcp-define-tool.test.js
      - name: MCP tools registration
        run: node --test app/mcp-tools.test.js
      - name: MCP jobs tools
        run: node --test app/mcp-jobs-tools.test.js
      - name: MCP Meta intent tools
        run: node --test app/mcp-meta-intent.test.js
      # Rate-limit stress — the "never get a client banned" canary. If
      # any assertion flips, a real brand is about to hit a platform's
      # rate-limit review queue.
      - name: MCP rate-limit stress
        run: node --test app/mcp-ratelimit-stress.test.js
      # Annotation validator — every defineTool() call must declare
      # destructive/idempotent/costImpact/brandRequired, and destructive
      # tools must declare preview: true|false. Missing any = blast-radius
      # bypass shipped silently.
      - name: MCP annotation validator
        run: node test/validate-mcp-annotations.js
