name: Skills Lint

on:
  push:
    paths:
      - '.claude/skills/**'
      - '.claude/commands/merlin.md'
      - 'test/validate-skills.js'
      - 'test/validate-vendor-cards.js'
      - 'test/routing-corpus.json'
      - 'test/run-routing-corpus.js'
      - 'tools/vendor-cards/**'
      - 'version.json'
      - '.github/workflows/skills-lint.yml'
  pull_request:
    paths:
      - '.claude/skills/**'
      - '.claude/commands/merlin.md'
      - 'test/validate-skills.js'
      - 'test/validate-vendor-cards.js'
      - 'test/routing-corpus.json'
      - 'test/run-routing-corpus.js'
      - 'tools/vendor-cards/**'
      - 'version.json'
      - '.github/workflows/skills-lint.yml'
  # Monthly audit — scheduled, produces a draft PR with telemetry summary
  # if description/byte-budget drift is detected against aggregated wisdom.
  schedule:
    - cron: '0 9 1 * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  validate:
    name: Validate skill manifest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Run skill validator
        run: node test/validate-skills.js
      - name: Verify routing corpus parses + every corpus skill exists
        run: node test/run-routing-corpus.js
      - name: Confirm version.json ships every SKILL in `updatable`
        run: node test/validate-skills.js --check-updatable
      # Vendor cards are derived from tools/vendor-cards/vendor-capabilities.json
      # by gen-vendor-cards.js. The validator re-runs the generator in --check
      # mode so any edit to the JSON without regenerating fails CI here.
      - name: Validate vendor capability cards (schema + action coverage + generator-sync)
        run: node test/validate-vendor-cards.js

  audit:
    name: Monthly audit (scheduled only)
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Verify WISDOM_READ_TOKEN is configured
        # Fail-loud sanity check: if the secret is missing from the repo
        # config, the curl below would send a bare `Bearer ` header and
        # the API would return an error body. The previous `|| echo '[]'`
        # fallback would then silently swallow that into an empty
        # telemetry file — so a "no drift detected" result could mean
        # "genuinely no drift" OR "audit never ran because auth failed."
        # Fail here so missing-secret runs are visibly red instead of
        # quietly fake-green.
        env:
          WISDOM_READ_TOKEN: ${{ secrets.WISDOM_READ_TOKEN }}
        run: |
          if [ -z "$WISDOM_READ_TOKEN" ]; then
            echo "::error::WISDOM_READ_TOKEN secret is not set — audit cannot run."
            echo "Configure it at: Settings → Secrets and variables → Actions"
            exit 1
          fi
      - name: Pull aggregated routing telemetry from wisdom-api
        # Telemetry is anonymized counts of (skill, intent_match, fallback_used)
        # per skill. Endpoint returns [] when there's no activity in the window
        # — that's a legitimate empty result, distinct from auth failure
        # (which the previous step refuses to let reach here).
        env:
          WISDOM_READ_TOKEN: ${{ secrets.WISDOM_READ_TOKEN }}
        run: |
          curl -sS --fail-with-body \
            -H "Authorization: Bearer $WISDOM_READ_TOKEN" \
            "https://api.merlingotme.com/audit/routing-telemetry?days=30" \
            -o test/.telemetry.json
      - name: Compile audit report
        id: audit
        run: node test/validate-skills.js --audit-report > test/.audit-report.md
      - name: Open draft PR if drift detected
        # Only open if the report contains actionable findings. The audit script
        # exits 0 with empty-marker output when nothing needs attention.
        run: |
          if grep -q "^## Drift detected" test/.audit-report.md; then
            BRANCH="audit/skills-$(date +%Y%m)"
            git config user.name "merlin-audit-bot"
            git config user.email "audit@merlingotme.com"
            git checkout -b "$BRANCH"
            git commit --allow-empty -m "Monthly skill audit — manual review required"
            git push origin "$BRANCH"
            gh pr create \
              --draft \
              --title "Monthly skill audit — $(date +%Y-%m)" \
              --body-file test/.audit-report.md \
              --label "audit,skills,manual-review"
          else
            echo "No drift detected — nothing to PR."
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
